name: livre_vivant
description: Une application Flutter immersive de lecture de livre.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4+2
  google_fonts: ^6.2.1
  http: ^1.2.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/books/mon_livre.json
    - assets/books/mon_livre_github.json
    - assets/books/livre_pedagogique_bash_linux.md
    - assets/books/hacking_etique.md
    - assets/images/cover.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/cover.png
  adaptive_icon_background: "#F6E7D3"
  adaptive_icon_foreground: assets/images/cover.png
